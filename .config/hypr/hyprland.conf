#source = /home/$USER/.cache/wal/colors-hyprland
source = /home/kali/.cache/wal/colors-hyprland

monitor=DP-4,1920x1080@75.00,552x0,1.00,transform,1
monitor=DP-5,1920x1080@240.00,1632x416,1.00

$terminal = kitty
$fileManager = thunar
$menu = wofi -n
exec-once = hyprctl setcursor Bibata-Modern-Ice 12
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server -s ~/.config/swayosd/style.css
exec-once = waybar
exec-once = swaync
exec-once = pypr
exec-once = swaync-client -df
exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
exec-once = hypridle
exec-once = awww-daemon
exec-once = sleep .5 && awww restore
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator
# Add this to your ~/.config/hypr/hyprland.conf
exec-once = /usr/lib/libexec/kdeconnectd


env = ELECTRON_OZONE_PLATFORM_HINT,wayland
#env = LIBVA_DRIVER_NAME,nvidia
#env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XCURSOR_SIZE,12
cursor = Bibata-Modern-Ice
general {
    gaps_in = 2
    gaps_out = 10
    border_size = 0
    col.active_border = $color9
    col.inactive_border = $color5
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.78
    inactive_opacity = 0.7
    fullscreen_opacity = 1
    blur {
        enabled = true
        size = 3
        passes = 5
        # FIX: removed deprecated 'new_optimizations' (removed in Hyprland 0.41+)
        ignore_opacity = true
        xray = false
        popups = true
    }
    shadow {
        enabled = true
        range = 15
        render_power = 5
        color = rgba(0,0,0,.5)
    }
}

xwayland {
    force_zero_scaling = true
}

animations {
    enabled = true
    bezier = fluid, 0.15, 0.85, 0.25, 1
    bezier = snappy, 0.3, 1, 0.4, 1
    animation = windows, 1, 3, fluid, popin 5%
    animation = windowsOut, 1, 2.5, snappy
    animation = fade, 1, 4, snappy
    animation = workspaces, 1, 1.7, snappy, slide
    animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    focus_on_activate = true
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = .6
    touchpad {
        natural_scroll = true
    }
}

gestures {
    # FIX: workspace_swipe_distance, workspace_swipe_cancel_ratio, and
    # workspace_swipe_min_speed_to_force were removed in Hyprland 0.51.
    # The new gesture system uses the 'gesture' keyword (see bottom of file).
    # If you need to tune swipe feel, use: workspace_swipe_invert, workspace_swipe_forever
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

$mainMod = SUPER
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, killactive
bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, V, exec, hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 800 800; dispatch centerwindow 1;"
bind = $mainMod, V, togglefloating
bind = $mainMod, A, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, F, fullscreen
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
$osd = swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')"

# Cycle through windows (Like Windows 10)
bind = $mainMod, TAB, cyclenext,          # focus next window
bind = $mainMod, TAB, bringactivetotop,   # bring it to the front


bind = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +15
bind = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -15
#For you Riley
bind = ,Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bind = ,XF86MonBrightnessUp, exec, swayosd-client --brightness +10
bind = ,XF86MonBrightnessDown, exec, swayosd-client --brightness -10
bind = ,XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bind = ,XF86AudioNext, exec, swayosd-client --playerctl next
bind = ,XF86AudioPrev, exec, swayosd-client --playerctl previous


bind = ALT,Left, movewindow, l
bind = ALT, right, movewindow, r
bind = ALT, up, movewindow, u
bind = ALT, down, movewindow, d
bind = CTRL, Print, exec, hyprshot -m region -o ~/Screenshots/
bind = , Print, exec, hyprshot -m window -o ~/Screenshots/
bind = ALT, Print, exec, hyprshot -m active -m output -o ~/Screenshots/
bind = $mainMod, l, exec, hyprlock
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = ALT, TAB, exec, wlogout -b 2
bind = ALT, w, exec, ~/.config/hypr/wallpaper.sh
bind = ALT, a, exec, ~/.config/waybar/scripts/refresh.sh
bind = ALT, B, exec, ~/.config/waybar/scripts/select.sh
bind = ALT, r, exec, ~/.config/swaync/refresh.sh
bind = $mainMod, M, exit
bind = $mainMod, SPACE, exec, pypr toggle term
bind = $mainMod, G, exec, pypr toggle music
bind = $mainMod, T, exec, pypr toggle taskbar
bind = $mainMod, ESCAPE, exec, pypr toggle spotify
#bind = CTRL, ESCAPE, exec, gksu #Dont worry about this

# Opens a wofi popup listing all hotkeys when you press F1
bind = , F1, exec, kitty --title "Cheatsheet" sh -c "man hyprland"

#open the notification panel
bind = $mainMod, N, exec, swaync-client -t -sw

# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window
# Screenshot a monitor (Focused)
bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
bind = $mainMod SHIFT, S, exec, hyprshot -m region



# OBS Studio Recording Toggle
bind = $mainMod, R, exec, obs --startrecording --minimize-to-tray
# To stop it, you can either click the tray or add a kill command, 
# but OBS is best managed via its own interface once started.

#FIX: Removed redundant 'ignore_alpha 0' lines — each namespace had both
# 'ignore_alpha 0' and 'ignore_alpha 0.5' applied, with the 0.5 always
# overriding the 0. Kept only the intended 0.5 value for each.
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha .3, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha .3, match:namespace swaync-notification-window

layerrule = no_anim on, match:namespace selection

layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0.5, match:namespace swayosd

# Gesture system (0.51+): replaces old gestures:workspace_swipe_* options
gesture = 3, horizontal, workspace

